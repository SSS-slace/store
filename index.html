<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Redemption App</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
        .container { background: #111; padding: 20px; border-radius: 20px; border: 2px solid #28a745; max-width: 400px; margin: auto; }
        input { width: 85%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; text-align: center; }
        button { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        #resultArea, #addressArea { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        img { max-width: 150px; border-radius: 10px; margin: 10px 0; }
        .price-tag { color: #ff4757; font-weight: bold; }
        .free-tag { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #28a745;">SSS Gift Portal</h2>
    
    <input type="text" id="codeInput" placeholder="Enter Gift Code" style="width: 70%;">
    <button onclick="checkCode()" style="width: 70%; padding: 8px;">Check Code</button>

    <div id="resultArea">
        <h3 id="productName"></h3>
        <img id="productImage" src="" alt="Product">
        <div class="price-tag" id="productPrice"></div>
        <div class="free-tag">But it's free for you!</div>
        <button onclick="showAddressForm()">Get the Gift Now</button>
    </div>

    <div id="addressArea">
        <input type="text" id="userAddress" placeholder="Full Address">
        <input type="text" id="userPin" placeholder="Pin Code">
        <input type="text" id="userPhone" placeholder="Mobile Number">
        <input type="email" id="usermail" placeholder="Gmail Address">
        <button onclick="confirmOrder()">Deliver</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://slace-4d2ae-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentCode = "";

    function checkCode() {
        currentCode = document.getElementById("codeInput").value;
        db.ref('GiftCodes/' + currentCode).once('value').then(s => {
            if (s.exists() && !s.val().isUsed) {
                let d = s.val();
                document.getElementById("productName").innerText = d.productName;
                document.getElementById("productImage").src = d.imageURL;
                document.getElementById("productPrice").innerText = "Price: " + d.price;
                document.getElementById("resultArea").style.display = "block";
            } else { alert("Invalid or already used code!"); }
        });
    }

    function showAddressForm() { document.getElementById("addressArea").style.display = "block"; }

    function confirmOrder() {
        let email = document.getElementById("usermail").value;
        let address = document.getElementById("userAddress").value;
        let pin = document.getElementById("userPin").value;
        let phone = document.getElementById("userPhone").value;

        if (!email || !address || !pin || !phone) { 
            alert("Please fill all details!"); 
            return; 
        }

        let fullAddress = address + ", Pin: " + pin + ", Ph: " + phone;

        db.ref('GiftCodes/' + currentCode).update({ isUsed: true });
        db.ref('Orders/').push({ 
            code: currentCode, 
            address: fullAddress, 
            email: email, 
            status: "Pending" 
        });
        
        alert("Success! Your product is booked. We will send a confirmation to your email.");
        location.reload();
    }
</script>
</body>
</html>
